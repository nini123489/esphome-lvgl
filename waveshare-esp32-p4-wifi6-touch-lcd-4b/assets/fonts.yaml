# Glyph list shared by all Roboto fonts. Adds German umlauts (ä ö ü Ä Ö Ü ß),
# Euro sign, ellipsis (…) and degree (°) on top of the ASCII printable range.
font:
  - file: "gfonts://Roboto"
    id: roboto17_font
    size: 26
    bpp: 4
    glyphs: &latin_glyphs
      - ' !"#$%&''()*+,-./0123456789:;<=>?@'
      - 'ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`'
      - 'abcdefghijklmnopqrstuvwxyz{|}~'
      - '°äöüÄÖÜß€…'

  - file: "gfonts://Roboto"
    id: roboto36_font
    size: 54
    bpp: 4
    glyphs: *latin_glyphs

  - file: "gfonts://Roboto"
    id: roboto48_font
    size: 72
    bpp: 4
    glyphs: *latin_glyphs

  - file: "gfonts://Roboto"
    id: roboto72_font
    size: 108
    bpp: 4
    glyphs: *latin_glyphs

  - file: "gfonts://Roboto"
    id: roboto44_font
    size: 66
    bpp: 4
    glyphs: *latin_glyphs

  - file: "gfonts://Roboto"
    id: roboto19_font
    size: 29
    bpp: 4
    glyphs: *latin_glyphs

  - file: "gfonts://Roboto"
    id: roboto18_font
    size: 27
    bpp: 4
    glyphs: *latin_glyphs

  - file: "gfonts://Roboto"
    id: roboto15_font
    size: 23
    bpp: 4
    glyphs: *latin_glyphs

lvgl:
  style_definitions:
    - id: roboto15_style
      text_font: roboto18_font
