# =============================================================================
# AUDIO STACK — HA Voice Satellite
# =============================================================================
# Requires ESPHome 2026.5.0+ (uses media_source / speaker_source / audio_http).
#
# Hardware pinout verified against agillis/esphome-modular-lvgl-buttons
# (waveshare-esp32-p4-wifi6-touch-lcd-4b.yaml).
#
# I2S:
#   MCLK=GPIO13  BCLK=GPIO12  LRCLK=GPIO10  DIN=GPIO11  DOUT=GPIO9
# Codecs on shared I2C (touchscreen_bus, SDA=7 SCL=8):
#   ES8311 (DAC) @ 0x18  |  ES7210 (ADC) @ 0x40
# Power-amp enable: GPIO53
# =============================================================================

# Needed by media_source audio_http to fetch streams/TTS over HTTP(S).
http_request:

i2s_audio:
  - id: audio_bus
    i2s_mclk_pin: GPIO13
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: touchscreen_bus
    address: 0x18

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: touchscreen_bus
    address: 0x40

microphone:
  - platform: i2s_audio
    id: esp32_microphone
    i2s_audio_id: audio_bus
    i2s_din_pin: GPIO11
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: esp32_speaker
    i2s_audio_id: audio_bus
    i2s_dout_pin: GPIO9
    audio_dac: es8311_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

  - platform: mixer
    id: mixing_speaker
    output_speaker: esp32_speaker
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

# HTTP audio sources for the speaker_source media_player below.
media_source:
  - platform: audio_http
    id: http_announcement_source
    buffer_size: 250000
  - platform: audio_http
    id: http_media_source
    buffer_size: 500000

# Power amplifier enable (NS4150B). RESTORE_DEFAULT_ON so it survives reboots.
switch:
  - platform: gpio
    pin: GPIO53
    name: "Speaker Enable"
    icon: "mdi:speaker"
    entity_category: config
    id: audio_amplifier
    restore_mode: RESTORE_DEFAULT_ON

# Modern HA-visible media_player. Using speaker_source platform (ESPHome
# 2026.5+) so it shows up correctly in Home Assistant.
media_player:
  - platform: speaker_source
    name: "Media Player"
    id: speaker_media_player
    volume_increment: 0.05
    volume_min: 0.5
    volume_max: 0.75
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
      sources:
        - http_announcement_source
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
      sources:
        - http_media_source
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - micro_wake_word.stop
            - voice_assistant.stop
            - wait_until:
                condition:
                  not:
                    microphone.is_capturing:
                timeout: 2s
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      if:
        condition:
          and:
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing:
                  id: speaker_media_player
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s
    on_play:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - micro_wake_word.stop
            - voice_assistant.stop
            - wait_until:
                condition:
                  not:
                    microphone.is_capturing:
                timeout: 2s
    on_idle:
      - delay: 500ms
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_playing:
                    id: speaker_media_player
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
          then:
            - micro_wake_word.start

# Local wake-word detection. probability_cutoff lowered from the model's
# default 0.97 to 0.85 so "Okay Nabu" triggers more reliably.
micro_wake_word:
  id: my_wake_word
  models:
    - model: okay_nabu
      probability_cutoff: 0.85
  on_wake_word_detected:
    then:
      - logger.log:
          format: "Wake word detected: %s"
          args: [ 'wake_word.c_str()' ]
      - voice_assistant.start:
          wake_word: !lambda return wake_word;

# Pulsating border animation: cycles 4 colors while voice_active=true.
globals:
  - id: voice_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: voice_pulse_step
    type: int
    restore_value: false
    initial_value: '0'

interval:
  # Watchdog: ensure the wake word listener is running. Fires soon after boot
  # so detection works even if Home Assistant's voice-satellite client never
  # establishes its session (on_client_connected might not fire in all setups).
  - interval: 30s
    then:
      - if:
          condition:
            not:
              micro_wake_word.is_running:
          then:
            - logger.log: "Wake word not running; (re)starting it"
            - micro_wake_word.start:

  - interval: 400ms
    then:
      - if:
          condition:
            lambda: 'return id(voice_active);'
          then:
            - globals.set:
                id: voice_pulse_step
                value: !lambda 'return (id(voice_pulse_step) + 1) % 4;'
            - if:
                condition:
                  lambda: 'return id(voice_pulse_step) == 0;'
                then:
                  - lvgl.widget.update:
                      id: voice_overlay
                      border_color: 0xE06A2A
            - if:
                condition:
                  lambda: 'return id(voice_pulse_step) == 1;'
                then:
                  - lvgl.widget.update:
                      id: voice_overlay
                      border_color: 0x4A90E2
            - if:
                condition:
                  lambda: 'return id(voice_pulse_step) == 2;'
                then:
                  - lvgl.widget.update:
                      id: voice_overlay
                      border_color: 0x9B59B6
            - if:
                condition:
                  lambda: 'return id(voice_pulse_step) == 3;'
                then:
                  - lvgl.widget.update:
                      id: voice_overlay
                      border_color: 0x2ECC71

# Voice assistant: ties everything together and drives the LVGL overlay.
voice_assistant:
  microphone: esp32_microphone
  media_player: speaker_media_player
  micro_wake_word: my_wake_word
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  conversation_timeout: 300s
  on_listening:
    - globals.set:
        id: voice_active
        value: 'true'
    - lvgl.label.update:
        id: voice_overlay_stt
        text: ""
    - lvgl.label.update:
        id: voice_overlay_tts
        text: ""
    - lvgl.label.update:
        id: voice_overlay_state
        text: "Höre zu…"
    - lvgl.widget.update:
        id: voice_overlay
        hidden: false
  on_stt_end:
    - lvgl.label.update:
        id: voice_overlay_stt
        text: !lambda 'return x;'
    - lvgl.label.update:
        id: voice_overlay_state
        text: "Verarbeite…"
  on_tts_start:
    - lvgl.label.update:
        id: voice_overlay_tts
        text: !lambda 'return x;'
    - lvgl.label.update:
        id: voice_overlay_state
        text: "Antwort"
  on_error:
    - lvgl.label.update:
        id: voice_overlay_state
        text: !lambda 'return "Fehler: " + message;'
    - delay: 3s
    - globals.set:
        id: voice_active
        value: 'false'
    - lvgl.widget.update:
        id: voice_overlay
        hidden: true
  on_end:
    # Give the TTS announcement time to be queued and to start playing.
    - delay: 1s
    - wait_until:
        condition:
          and:
            - not:
                media_player.is_announcing:
                  id: speaker_media_player
            - not:
                media_player.is_playing:
                  id: speaker_media_player
        timeout: 30s
    - delay: 300ms
    # Stop the pulsing border once the answer is actually out — but leave the
    # overlay visible (with the response text) for a few seconds so the user
    # has time to read it.
    - globals.set:
        id: voice_active
        value: 'false'
    - delay: 8s
    - lvgl.widget.update:
        id: voice_overlay
        hidden: true
    - micro_wake_word.start:
  on_client_connected:
    - logger.log: "Voice assistant client connected; starting wake word"
    - micro_wake_word.start:
  on_client_disconnected:
    - logger.log: "Voice assistant client disconnected; stopping wake word"
    - micro_wake_word.stop:
