# Backlight (exposed to Home Assistant as "Display")
# When the light is turned off (from HA, presence, automation, ...), LVGL is
# paused so touch events are NOT delivered to widgets. A tap on the dark
# screen is then handled by the touchscreen's on_touch action (in device.yaml),
# which simply re-enables the backlight — waking the UI without pressing any
# button. The next tap drives the UI normally.
light:
  - platform: monochromatic
    name: Display
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s
    on_turn_on:
      - lvgl.resume:
    on_turn_off:
      - lvgl.pause:
          show_snow: true

# Screensaver Presence Trigger
binary_sensor:
  - platform: homeassistant
    id: presence
    entity_id: binary_sensor.office_presence_group
    on_press:
      - light.turn_on:
          id: backlight
      - logger.log: "Screensaver is turned off"

    on_release:
      - light.turn_off:
          id: backlight
      - logger.log: "Screensaver is turned on"