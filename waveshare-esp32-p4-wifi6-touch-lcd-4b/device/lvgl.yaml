# =============================================================================
# LVGL TOUCHSCREEN INTERFACE
# =============================================================================
# This file defines the graphical user interface (GUI) for the ESP32 touchscreen
# display. It creates buttons that control smart home devices through Home Assistant.
#
# HOW IT WORKS:
# - Each button sends a command to Home Assistant when pressed (on_press/on_click)
# - Buttons receive state updates from sensors defined in sensors.yaml
# - When a sensor changes, the button's appearance updates (checked/unchecked)
#
# KEY CONCEPTS:
# - "id:" is a unique name used to reference this element from other files
# - "entity_id:" refers to a device/entity in Home Assistant
# - "checkable: true" means the button shows on/off state visually
# - "$variable" values (like $button_width) are defined in template.yaml
# - Sensors in sensors.yaml watch Home Assistant and update button states
# =============================================================================

lvgl:
  buffer_size: 100%
  byte_order: little_endian
  displays: my_display
  touchscreens: my_touchscreen
  top_layer:
    widgets:

      # =========================================================================
      # TEMPERATURE DISPLAY (Top-left corner of screen)
      # =========================================================================
      # WHAT IT SHOWS:
      #   Displays two temperatures: "outdoor° / indoor°"
      #   Example: "15° / 22°" means 15°C outside, 22°C in the office
      #
      # WHERE THE DATA COMES FROM (defined in sensors.yaml):
      #   - Left number: sensor.outdoor_temperature (weather/outdoor sensor)
      #   - Right number: sensor.office_temperature (indoor room sensor)
      #
      # HOW IT UPDATES:
      #   When either temperature sensor changes in Home Assistant, the
      #   sensors.yaml file triggers an update to this label's text.
      # =========================================================================
      - label:
          text: "-° / -°"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 12
          y: 6
          text_color: 0xFFFFFF

      # =========================================================================
      # CLOCK DISPLAY (Top-center of screen)
      # =========================================================================
      # WHAT IT SHOWS:
      #   Current time in 24-hour format (e.g., "14:30")
      #
      # WHERE THE DATA COMES FROM:
      #   The time component (configured in addon/time.yaml) syncs with
      #   Home Assistant's time and updates this label every minute.
      # =========================================================================
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 6
          text_align: center
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 51
      pad_bottom: 8
      pad_left: 8
      pad_right: 8

      widgets:

        # =========================================================================
        # BUTTON: 3D Printer Power
        # =========================================================================
        # WHAT THIS BUTTON DOES:
        #   Turns the 3D printer's power outlet on or off.
        #   This controls a smart plug that supplies power to the printer.
        #
        # WHEN PRESSED:
        #   Calls Home Assistant service: switch.toggle
        #   Target: switch.office_3d_printer_power
        #   (Toggle means: if ON, turn OFF. If OFF, turn ON.)
        #
        # HOW THE BUTTON KNOWS IF IT'S ACTIVE:
        #   sensors.yaml monitors: switch.office_3d_printer_power
        #   When the switch is ON, this button appears "checked" (highlighted)
        #   When the switch is OFF, this button appears unchecked (dimmed)
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: printer_power_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 1
            widgets:
              # Icon (shown when OFF)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: printer_power_icon
                  text: $printer
              # Progress (shown when ON)
              - obj:
                  align: top_left
                  id: print_progress_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: roboto44_font
                        text_color: 0xFFFFFF
                        id: print_progress_label
                        text: "--"
                    - label:
                        text_font: roboto17_font
                        text_color: 0xFFFFFF
                        text: "%"
              - label:
                  align: bottom_left
                  id: printer_power_label
                  text: "Printer"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_3d_printer_power





    - id: heating_lab_page
      layout:
        type: flex
        flex_flow: column
      scrollbar_mode: "off"
      width: 100%
      height: 100%
      bg_color: 0x1E1E1E
      bg_opa: cover

      widgets:
        - obj:
            id: heating_lab_root
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            widgets:
              # Back button
              - button:
                  id: heating_lab_back_button
                  width: 90px
                  height: 90px
                  x: 8
                  y: 51
                  styles: control
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $chevron_left
                  on_click:
                    - lvgl.page.show: main_page

              # Base track arc
              - arc:
                  id: heating_track_arc
                  x: 90
                  y: 120
                  width: 540
                  height: 540
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 27
                  arc_color: 0x3A3A3A
                  clickable: false
                  adjustable: false
                  indicator:
                    arc_color: 0x3A3A3A
                    arc_width: 0
                  knob:
                    bg_color: 0x3A3A3A

              # Delta arc between current and target temperatures
              - arc:
                  id: heating_delta_arc
                  x: 90
                  y: 120
                  width: 540
                  height: 540
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0xE06A2A
                    arc_width: 27
                  knob:
                    bg_color: 0x000000
                  clickable: false

              # Mask arc to hide the segment below the minimum (track color)
              - arc:
                  id: heating_mask_arc
                  x: 90
                  y: 120
                  width: 540
                  height: 540
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0x8A3F1E
                    arc_width: 27
                  knob:
                    bg_color: 0x000000
                  clickable: false

              # Dot for current temperature
              - arc:
                  id: heating_current_arc
                  x: 90
                  y: 120
                  width: 540
                  height: 540
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0x000000
                    arc_width: 0
                  knob:
                    bg_color: 0xFFFFFF
                    border_width: 3
                    border_color: 0xE06A2A
                  clickable: false

              # Dot for target temperature
              - arc:
                  id: heating_target_dot_arc
                  x: 98
                  y: 128
                  width: 525
                  height: 525
                  min_value: 20
                  max_value: 64
                  start_angle: 135
                  end_angle: 45
                  rotation: 0
                  value: 44
                  arc_width: 0
                  arc_color: 0x000000
                  indicator:
                    arc_color: 0x000000
                    arc_width: 0
                  knob:
                    bg_color: 0xFFFFFF
                    width: 60
                    height: 60
                    radius: 20
                    border_width: 6
                    border_color: 0xE06A2A
                  clickable: true
                  adjustable: true
                  on_value:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_radiator_thermostat
                          hvac_mode: heat
                          temperature: !lambda return (float)x / 2.0f;

              # Mode label
              - label:
                  id: heating_lab_mode_label
                  text: "Heating"
                  text_font: roboto19_font
                  text_color: 0xE06A2A
                  align: center
                  y: -70

              # Target temperature label (center)
              - label:
                  id: heating_lab_target_label
                  text: "--.-°C"
                  text_font: roboto48_font
                  text_color: 0xE6E6E6
                  align: center

              # Current temperature label (below)
              - obj:
                  id: heating_lab_current_row
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  align: center
                  y: 83
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: center
                  widgets:
                    - label:
                        id: heating_lab_current_icon
                        text: $thermometer
                        text_font: icon_font_small
                        text_color: 0xE06A2A
                        align: center
                        pad_right: 9
                    - label:
                        id: heating_lab_current_value
                        text: "--.-°C"
                        text_font: roboto19_font
                        text_color: 0xE06A2A
                        align: center

              # Down button (-0.5C)
              - button:
                  id: heating_lab_down_button
                  width: 105px
                  height: 105px
                  x: 240
                  y: 540
                  styles: control
                  radius: 53px
                  bg_opa: TRANSP
                  border_width: 3
                  border_color: 0x7A7A7A
                  widgets:
                    - label:
                        text: "-"
                        text_font: roboto44_font
                        align: center
                        text_color: 0xB0B0B0
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_radiator_thermostat
                          hvac_mode: heat
                          temperature: !lambda |-
                            if (id(heating_target_temperature).has_state()) {
                              return id(heating_target_temperature).state - 0.5f;
                            }
                            return 0.0f;

              # Up button (+0.5C)
              - button:
                  id: heating_lab_up_button
                  width: 105px
                  height: 105px
                  x: 390
                  y: 540
                  styles: control
                  radius: 53px
                  bg_opa: TRANSP
                  border_width: 3
                  border_color: 0x7A7A7A
                  widgets:
                    - label:
                        text: "+"
                        text_font: roboto44_font
                        align: center
                        text_color: 0xB0B0B0
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.office_radiator_thermostat
                          hvac_mode: heat
                          temperature: !lambda |-
                            if (id(heating_target_temperature).has_state()) {
                              return id(heating_target_temperature).state + 0.5f;
                            }
                            return 0.0f;
